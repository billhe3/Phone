<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Loot Container Viewer</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

    <header class="app-header">
        <h1>Counter-Strike 2</h1>
        <p>Container Inspect Utility</p>
    </header>

    <main>
        <div id="case-grid" class="case-grid">
            <div class="loading-state">Syncing secure Steam database cache...</div>
        </div>
    </main>

    <div id="detail-modal" class="modal-overlay">
        <div class="modal-body">
            <button class="close-btn" id="close-modal">&times;</button>
            <h2 id="modal-case-title" style="text-transform: uppercase; font-size: 18px; margin-top:0;">Weapon Case</h2>
            <div id="modal-loot-grid" class="loot-grid"></div>
        </div>
    </div>

    <script>
        // Check if the user is on a mobile device
        const isMobileDevice = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        if (isMobileDevice) {
            // --- MOBILE ENGINE ---
            console.log("Mobile device detected. Running proxy mirror bypass...");
            
            const MOBILE_RARITY_MAP = {
                "Covert": "var(--rarity-covert)", "Classified": "var(--rarity-classified)", 
                "Restricted": "var(--rarity-restricted)", "Mil-Spec Grade": "var(--rarity-milspec)",
                "Industrial Grade": "var(--rarity-industrial)", "Consumer Grade": "var(--rarity-consumer)",
                "Extraordinary": "var(--rarity-covert)"
            };

            async function initMobileEngine() {
                const grid = document.getElementById('case-grid');
                try {
                    // Channelling through cors-anywhere proxy mirror to smash the connection block
                    const targetUrl = 'https://csgobackpack.net/api/v1/containers/list';
                    const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`);
                    
                    if (!res.ok) throw new Error("Proxy server line busy.");
                    const proxyData = await res.json();
                    
                    // Parse out the clean data block from inside the wrapper
                    const data = JSON.parse(proxyData.contents);
                    grid.innerHTML = '';

                    Object.keys(data.containers).forEach(key => {
                        const item = data.containers[key];
                        if (item.type === "Case" || item.type === "Souvenir Package") {
                            const card = document.createElement('div');
                            card.className = 'case-card';
                            card.innerHTML = `<img src="${item.image}" alt="${item.name}" loading="lazy"><h3>${item.name}</h3>`;
                            
                            card.addEventListener('click', () => {
                                document.getElementById('modal-case-title').innerText = item.name;
                                const lootGrid = document.getElementById('modal-loot-grid');
                                lootGrid.innerHTML = '';

                                if (!item.contains || item.contains.length === 0) {
                                    lootGrid.innerHTML = '<div class="loading-state">Special item rewards container.</div>';
                                } else {
                                    item.contains.forEach(skin => {
                                        const color = MOBILE_RARITY_MAP[skin.rarity] || "var(--text-muted)";
                                        const lootCard = document.createElement('div');
                                        lootCard.className = 'loot-item';
                                        lootCard.style.setProperty('--tier-glow', color);
                                        lootCard.style.borderBottom = `3px solid ${color}`;
                                        lootCard.innerHTML = `
                                            <img src="${skin.image || ''}" alt="${skin.name}" loading="lazy">
                                            <div class="rarity-label" style="color: ${color};">${skin.rarity || 'Standard'}</div>
                                            <div class="weapon-title">${skin.name}</div>
                                        `;
                                        lootGrid.appendChild(lootCard);
                                    });
                                }
                                document.getElementById('detail-modal').classList.add('active');
                            });
                            grid.appendChild(card);
                        }
                    });
                } catch (err) {
                    grid.innerHTML = `<div class="loading-state" style="color: var(--rarity-covert);">Mobile Sync Failure: ${err.message}</div>`;
                }
            }

            document.getElementById('close-modal').addEventListener('click', () => document.getElementById('detail-modal').classList.remove('active'));
            document.addEventListener('DOMContentLoaded', initMobileEngine);

        } else {
            // --- PC ADVANCED MODULAR ENGINE ---
            // Leave your advanced folder structure untouched for your computer!
            console.log("Desktop PC verified. Initiating advanced module grid system...");
            const scriptModule = document.createElement('script');
            scriptModule.type = 'module';
            scriptModule.src = 'js/app.js';
            document.body.appendChild(scriptModule);
        }
    </script>
</body>
</html>
