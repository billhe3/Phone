<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Loot Container Viewer</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

    <header class="app-header">
        <h1>Counter-Strike 2</h1>
        <p>Container Inspect Utility</p>
    </header>

    <main>
        <div id="case-grid" class="case-grid">
            <div class="loading-state">Syncing secure Steam database cache...</div>
        </div>
    </main>

    <div id="detail-modal" class="modal-overlay" aria-hidden="true">
        <div class="modal-body">
            <button class="close-btn" id="close-modal" aria-label="Close modal">&times;</button>
            <div class="modal-header-block">
                <span class="sub-tag">Container Contents</span>
                <h2 id="modal-case-title">Weapon Case</h2>
            </div>
            <div id="modal-loot-grid" class="loot-grid"></div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
