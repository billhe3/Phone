<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Loot Container Viewer</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body>

    <header class="app-header">
        <h1>Counter-Strike 2</h1>
        <p>Container Inspect Utility</p>
    </header>

    <main>
        <div id="case-grid" class="case-grid">
            <div class="loading-state">Syncing secure Steam database cache...</div>
        </div>
    </main>

    <div id="detail-modal" class="modal-overlay">
        <div class="modal-body">
            <button class="close-btn" id="close-modal">&times;</button>
            <h2 id="modal-case-title" style="text-transform: uppercase; font-size: 18px; margin-top:0;">Weapon Case</h2>
            <div id="modal-loot-grid" class="loot-grid"></div>
        </div>
    </div>

    <script>
        // Check if the user is using a mobile browser framework
        const isMobileDevice = /Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        if (isMobileDevice) {
            // --- MOBILE ENGINE ---
            console.log("Mobile device verified. Loading unpkg stream...");
            
            const MOBILE_TIER_MAP = {
                "rarity_ancient_weapon": "var(--rarity-covert)",
                "rarity_legendary_weapon": "var(--rarity-classified)",
                "rarity_mythical_weapon": "var(--rarity-restricted)",
                "rarity_rare_weapon": "var(--rarity-milspec)",
                "rarity_uncommon_weapon": "var(--rarity-industrial)",
                "rarity_common_weapon": "var(--rarity-consumer)",
                "rarity_ancient": "var(--rarity-covert)" 
            };

            let MOBILE_SKINS_LOOKUP = {};

            async function initMobileEngine() {
                const grid = document.getElementById('case-grid');
                try {
                    // Fetch directly from unpkg CDN to completely bypass CORS filters on phones
                    const [cratesResponse, skinsResponse] = await Promise.all([
                        fetch('https://unpkg.com/csgo-api@1.3.0/public/api/en/crates.json'),
                        fetch('https://unpkg.com/csgo-api@1.3.0/public/api/en/skins.json')
                    ]);

                    if (!cratesResponse.ok || !skinsResponse.ok) {
                        throw new Error("CDN data mirror didn't respond.");
                    }

                    const crates = await cratesResponse.json();
                    const skins = await skinsResponse.json();

                    MOBILE_SKINS_LOOKUP = skins.reduce((map, item) => {
                        if (item && item.id) map[item.id] = item;
                        return map;
                    }, {});

                    grid.innerHTML = '';

                    const containers = crates.filter(c => c && (c.type === 'case' || c.type === 'package'));
                    
                    containers.forEach(container => {
                        if (container && container.image) {
                            const card = document.createElement('div');
                            card.className = 'case-card';
                            card.innerHTML = `<img src="${container.image}" alt="${container.name}" loading="lazy"><h3>${container.name}</h3>`;
                            
                            card.addEventListener('click', () => {
                                document.getElementById('modal-case-title').innerText = container.name;
                                const lootGrid = document.getElementById('modal-loot-grid');
                                lootGrid.innerHTML = '';

                                if (!container.contains || container.contains.length === 0) {
                                    lootGrid.innerHTML = '<div class="loading-state">Special items inside.</div>';
                                } else {
                                    container.contains.forEach(itemId => {
                                        const item = MOBILE_SKINS_LOOKUP[itemId];
                                        if (!item) return;

                                        const color = MOBILE_TIER_MAP[item.rarity?.id] || "var(--text-muted)";
                                        const rarityName = item.rarity?.name || "Standard";
                                        
                                        const nameParts = item.name ? item.name.split(' | ') : ["Unknown"];
                                        const weaponTitle = nameParts[0] || "";
                                        const skinSubtitle = nameParts[1] ? `| ${nameParts[1]}` : "";

                                        const lootCard = document.createElement('div');
                                        lootCard.className = 'loot-item';
                                        lootCard.style.setProperty('--tier-glow', color);
                                        lootCard.style.borderBottom = `3px solid ${color}`;
                                        lootCard.innerHTML = `
                                            <img src="${item.image || ''}" alt="${item.name || 'Skin'}" loading="lazy">
                                            <div class="rarity-label" style="color: ${color};">${rarityName}</div>
                                            <div class="weapon-title">${weaponTitle}<br><span class="skin-name">${skinSubtitle}</span></div>
                                        `;
                                        lootGrid.appendChild(lootCard);
                                    });
                                }
                                document.getElementById('detail-modal').classList.add('active');
                            });
                            grid.appendChild(card);
                        }
                    });
                } catch (err) {
                    grid.innerHTML = `<div class="loading-state" style="color: var(--rarity-covert);">Mobile Sync Failure: ${err.message}</div>`;
                }
            }

            document.getElementById('close-modal').addEventListener('click', () => document.getElementById('detail-modal').classList.remove('active'));
            document.addEventListener('DOMContentLoaded', initMobileEngine);

        } else {
            // --- PC ADVANCED MODULAR ENGINE ---
            // Computer detects this, keeping your premium multi-file setup untouched
            console.log("Desktop PC verified. Initiating advanced module grid system...");
            const scriptModule = document.createElement('script');
            scriptModule.type = 'module';
            scriptModule.src = 'js/app.js';
            document.body.appendChild(scriptModule);
        }
    </script>
</body>
</html>
