<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS2 Inventory Viewer Component</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        body { background-color: var(--bg-dark-900); color: var(--text-primary); margin: 0; padding: 40px; font-family: system-ui, -apple-system, sans-serif; }
        .modal-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(5,6,8,0.85); backdrop-filter: blur(8px); z-index:999; justify-content:center; align-items:center; }
        .modal-overlay.active { display: flex; }
        .modal-body { background: var(--bg-dark-900); border: 1px solid var(--border-subtle); border-radius: 16px; padding: 32px; width: 90%; max-width: 900px; max-height: 80vh; overflow-y: auto; }
        .loot-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-top: 24px; }
    </style>
</head>
<body>

    <h2 style="text-align: center; text-transform: uppercase; letter-spacing: 2px;">Inspect Weapon Containers</h2>
    <div id="case-grid" class="case-grid"></div>

    <div id="detail-modal" class="modal-overlay" onclick="if(event.target === this) this.classList.remove('active')">
        <div class="modal-body">
            <h3 id="modal-case-title" style="text-transform: uppercase; margin-top: 0;"></h3>
            <div id="modal-loot-grid" class="loot-grid"></div>
        </div>
    </div>

    <script type="module" src="js/app.js"></script>
</body>
</html>
